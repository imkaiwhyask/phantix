<!DOCTYPE html>
<html>
<head>
  <title>Phantix</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="login" class="login-page">
  <div class="card login-card shadow-sm">
    <div class="card-body">
      <h3 class="text-center mb-1">Phantix</h3>
      <p class="text-center text-muted mb-4">Sign in to continue</p>

      <input id="email" class="form-control mb-3" placeholder="Email">
      <input id="password" type="password" class="form-control mb-3" placeholder="Password">

     <button class="btn btn-dark w-100" onclick="login()">Login</button>
    </div>
  </div>
</div>

<div id="app" class="app-shell">
  <aside class="sidebar">
    <div class="brand">Phantix</div>
    <div class="small text-muted mb-2">Messages</div>
    <div id="users" class="user-list"></div>
  </aside>

  <main class="chat-panel">
    <div class="chat-header">
      <div>
        <h5 id="chatTitle" class="mb-0">Messages</h5>
        <small class="text-muted">Internal messaging</small>
      </div>
    </div>

    <div class="messages" id="messages">
    <div id="emptyState" style="text-align:center; color:#9ca3af; margin-top:50px;">
    Open a chat to begin messaging
  </div>
</div>

    <div id="messageInputArea" class="message-input">
      <textarea id="msg" class="form-control" placeholder="Type a message" rows="1"></textarea>
     <button class="btn btn-dark" onclick="sendMessage()">Send</button>
    </div>
  </main>
</div>

<script src="renderer.js"></script>
</body>
</html>
